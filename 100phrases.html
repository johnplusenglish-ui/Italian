<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Italian Phrases – Interactive Game</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --card: #FFFFFF;
    --card-border: #E8E4DF;
    --text: #2C2418;
    --text-dim: #9E9589;
    --accent: #C05621;
    --accent-bg: #FFF5EE;
    --success: #2E7D4F;
    --success-bg: #ECFDF3;
    --wrong: #C53030;
    --wrong-bg: #FFF5F5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1612;
      --card: #262019;
      --card-border: #3D352B;
      --text: #F0EBE3;
      --text-dim: #8A7F72;
      --accent: #E07842;
      --accent-bg: #2D1F14;
      --success: #48BB78;
      --success-bg: #1A2E22;
      --wrong: #FC8181;
      --wrong-bg: #2D1A1A;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .shake { animation: shake 0.4s; }
  .fade-up { animation: fadeUp 0.5s ease; }
  button { font-family: 'DM Sans', sans-serif; transition: transform 0.12s, box-shadow 0.12s; }
  button:active { transform: scale(0.97) !important; }

  .container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header-sub { font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-dim); margin-bottom: 6px; }
  .header-title { font-size: 28px; font-weight: 800; color: var(--text); }
  .back-btn { margin-top: 8px; background: none; border: none; color: var(--text-dim); font-size: 13px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

  .progress-track { height: 4px; background: var(--card-border); border-radius: 2px; margin-bottom: 24px; }
  .progress-fill { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .mode-card { padding: 24px 16px; border-radius: 16px; border: 2px solid var(--card-border); background: var(--card); cursor: pointer; text-align: left; display: flex; flex-direction: column; gap: 6px; }
  .mode-card:hover { border-color: var(--accent); }
  .mode-icon { font-size: 28px; }
  .mode-label { font-size: 16px; font-weight: 700; color: var(--text); }
  .mode-desc { font-size: 12px; color: var(--text-dim); }

  .tip-box { padding: 16px 20px; border-radius: 14px; background: var(--accent-bg); border: 1px solid var(--accent); margin-top: 8px; font-size: 13px; color: var(--accent); line-height: 1.5; }

  .cat-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .cat-btn { padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .cat-btn.active { border: 2px solid var(--accent); background: var(--accent-bg); color: var(--accent); }
  .cat-btn.inactive { border: 2px solid var(--card-border); background: var(--card); color: var(--text-dim); }

  .start-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; }

  .phrase-card { text-align: center; padding: 36px 24px; margin-bottom: 28px; border-radius: 16px; background: var(--card); border: 2px solid var(--card-border); }
  .phrase-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 12px; }
  .phrase-text { font-size: 26px; font-weight: 700; font-style: italic; color: var(--accent); }

  .option-btn { padding: 14px 18px; border-radius: 12px; border: 2px solid var(--card-border); background: var(--card); color: var(--text); font-size: 15px; text-align: left; cursor: pointer; width: 100%; }
  .option-btn .letter { color: var(--text-dim); margin-right: 10px; font-size: 13px; }

  .match-col-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
  .match-btn { padding: 12px 14px; border-radius: 10px; border: 2px solid var(--card-border); background: var(--card); color: var(--text); font-size: 15px; text-align: left; cursor: pointer; width: 100%; font-weight: 600; }
  .match-btn.it-text { font-style: italic; }

  .flip-container { cursor: pointer; perspective: 800px; margin-bottom: 28px; height: 220px; }
  .flip-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; padding: 24px; }
  .flip-front { background: var(--card); border: 2px solid var(--card-border); }
  .flip-back { background: var(--accent-bg); border: 2px solid var(--accent); transform: rotateY(180deg); }

  .type-row { display: flex; gap: 10px; }
  .type-input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 2px solid var(--card-border); background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; }
  .type-input:focus { border-color: var(--accent); }
  .check-btn { padding: 14px 22px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }

  .results-emoji { font-size: 64px; margin-bottom: 8px; }
  .results-msg { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .results-pct { font-size: 48px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .results-sub { font-size: 16px; color: var(--text-dim); margin-bottom: 32px; }
  .results-btns { display: flex; gap: 12px; justify-content: center; }
  .btn-outline { padding: 14px 28px; border-radius: 12px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: 600; font-size: 15px; cursor: pointer; }
  .btn-solid { padding: 14px 28px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Screens rendered by JS -->
</div>

<script>
const PHRASES = [

  {it:"Ci vediamo!",en:"See you!",cat:"Greetings & Farewells"},
  {it:"In bocca al lupo!",en:"Good luck!",cat:"Greetings & Farewells"},
  {it:"Grazie mille!",en:"Thanks a lot!",cat:"Politeness"},
  {it:"Prego.",en:"You're welcome. / Please.",cat:"Politeness"},
  {it:"Per favore.",en:"Please.",cat:"Politeness"},
  {it:"Mi scusi.",en:"Excuse me. (formal)",cat:"Politeness"},
  {it:"Scusa!",en:"Sorry! (informal)",cat:"Politeness"},
  {it:"Non ti preoccupare.",en:"Don't worry.",cat:"Politeness"},
  {it:"Non fa niente.",en:"It doesn't matter.",cat:"Politeness"},
  {it:"Mi dispiace.",en:"I'm sorry.",cat:"Politeness"},
  {it:"Figurati!",en:"Don't mention it! (informal)",cat:"Politeness"},
  {it:"Si figuri!",en:"Don't mention it! (formal)",cat:"Politeness"},
  {it:"Che bello!",en:"How nice! / How beautiful!",cat:"Conversation"},
  {it:"Che bravo!",en:"Well done!",cat:"Conversation"},
  {it:"Che schifo!",en:"How disgusting!",cat:"Conversation"},
  {it:"Che peccato!",en:"What a shame!",cat:"Conversation"},
  {it:"Che fortuna!",en:"What luck!",cat:"Conversation"},
  {it:"Mamma mia!",en:"Oh my! / My goodness!",cat:"Conversation"},
  {it:"Magari!",en:"If only! / I wish!",cat:"Conversation"},
  {it:"Davvero?",en:"Really?",cat:"Conversation"},
  {it:"Sul serio?",en:"Seriously?",cat:"Conversation"},
  {it:"Ma dai!",en:"Come on! / No way!",cat:"Conversation"},
  {it:"Basta!",en:"Enough! / Stop it!",cat:"Conversation"},
  {it:"Boh!",en:"I dunno! / Who knows!",cat:"Conversation"},
  {it:"Ecco!",en:"Here it is! / Exactly!",cat:"Conversation"},
  {it:"Senti…",en:"Listen…",cat:"Conversation"},
  {it:"Guarda…",en:"Look…",cat:"Conversation"},
  {it:"D'accordo.",en:"Agreed. / OK.",cat:"Agreement"},
  {it:"Va bene.",en:"OK. / All right.",cat:"Agreement"},
  {it:"Certo!",en:"Of course! / Sure!",cat:"Agreement"},
  {it:"Esatto!",en:"Exactly!",cat:"Agreement"},
  {it:"Hai ragione.",en:"You're right.",cat:"Agreement"},
  {it:"Non sono d'accordo.",en:"I don't agree.",cat:"Agreement"},
  {it:"Assolutamente no.",en:"Absolutely not.",cat:"Agreement"},
  {it:"Neanche per sogno!",en:"Not in a million years!",cat:"Agreement"},
  {it:"Dipende.",en:"It depends.",cat:"Agreement"},
  {it:"Può darsi.",en:"Maybe. / It could be.",cat:"Agreement"},

  {it:"Puoi ripetere?",en:"Can you repeat?",cat:"Asking"},
  {it:"Non ho capito.",en:"I didn't understand.",cat:"Asking"},
  {it:"Che cosa intendi?",en:"What do you mean?",cat:"Asking"},
  {it:"Quanto costa?",en:"How much does it cost?",cat:"Asking"},
  {it:"Dov'è…?",en:"Where is…?",cat:"Asking"},
  {it:"Che ore sono?",en:"What time is it?",cat:"Asking"},
  {it:"Come mai?",en:"How come? / Why?",cat:"Asking"},
  {it:"Perché no?",en:"Why not?",cat:"Asking"},
  {it:"Sono stanco/a morto/a.",en:"I'm dead tired.",cat:"Feelings"},
  {it:"Non ne posso più!",en:"I can't take it anymore!",cat:"Feelings"},
  {it:"Mi fa piacere.",en:"I'm glad.",cat:"Feelings"},
  {it:"Mi sono divertito/a un sacco.",en:"I had a great time.",cat:"Feelings"},
  {it:"Ho una fame da lupo!",en:"I'm starving!",cat:"Feelings"},
  {it:"Che noia!",en:"How boring!",cat:"Feelings"},

  {it:"Facciamo così.",en:"Let's do it this way.",cat:"Actions"},
  {it:"Ci penso io.",en:"I'll take care of it.",cat:"Actions"},
  {it:"Tocca a te.",en:"It's your turn.",cat:"Actions"},
  {it:"Non c'è fretta.",en:"There's no rush.",cat:"Actions"},
  {it:"Fai con calma.",en:"Take your time.",cat:"Actions"},
  {it:"Mi fai un favore?",en:"Can you do me a favour?",cat:"Actions"},
  {it:"Ce la faccio.",en:"I can manage.",cat:"Actions"},
  {it:"Non ce la faccio.",en:"I can't manage.",cat:"Actions"},
  {it:"Sto arrivando!",en:"I'm on my way!",cat:"Actions"},

  {it:"A dire il vero…",en:"To tell the truth…",cat:"Opinions"},
  {it:"Insomma…",en:"Well… / In short…",cat:"Opinions"},
  {it:"Per quanto riguarda…",en:"As far as … is concerned…",cat:"Opinions"},
  {it:"È un casino!",en:"It's a mess!",cat:"Opinions"},
  {it:"Non ha senso.",en:"It doesn't make sense.",cat:"Opinions"},
  {it:"Vale la pena.",en:"It's worth it.",cat:"Opinions"},
  {it:"Non vale la pena.",en:"It's not worth it.",cat:"Opinions"},
  {it:"Mi sa che…",en:"I think that…",cat:"Opinions"},
  {it:"Che ne pensi?",en:"What do you think?",cat:"Opinions"},
  {it:"Prendiamo un caffè?",en:"Shall we get a coffee?",cat:"Food & Social"},
  {it:"Cin cin!",en:"Cheers!",cat:"Food & Social"},
  {it:"Buon appetito!",en:"Enjoy your meal!",cat:"Food & Social"},
  {it:"Il conto, per favore.",en:"The bill, please.",cat:"Food & Social"},
  {it:"Offro io.",en:"It's my treat.",cat:"Food & Social"},
  {it:"Mi passi il sale?",en:"Can you pass me the salt?",cat:"Food & Social"},
  {it:"Che buono!",en:"Delicious!",cat:"Food & Social"},
  {it:"Hai già mangiato?",en:"Have you already eaten?",cat:"Food & Social"},
  {it:"Dove ci troviamo?",en:"Where shall we meet?",cat:"Food & Social"},
  {it:"Ti va di uscire?",en:"Do you feel like going out?",cat:"Food & Social"},
];

const CATEGORIES = [...new Set(PHRASES.map(p => p.cat))];
const MODES = [
  {id:"match",label:"Match Pairs",icon:"🔗",desc:"Tap Italian → tap English"},
  {id:"quiz",label:"Multiple Choice",icon:"🎯",desc:"Pick the right translation"},
  {id:"flip",label:"Flashcards",icon:"🃏",desc:"Flip to reveal & self-grade"},
  {id:"type",label:"Type It",icon:"⌨️",desc:"Type the English translation"},
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function normalize(s) { return s.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim(); }

const app = document.getElementById('app');
let state = {
  screen: 'home', mode: null,
  selectedCats: new Set(CATEGORIES),
  gamePhrases: [], score: 0, total: 0,
  // match state
  matchRound: 0, matchScore: 0, matchTotal: 0, matchSelIt: null, matchMatched: new Set(), matchWrong: null, matchRounds: [],
  // quiz state
  quizIdx: 0, quizScore: 0, quizSelected: null, quizOrder: [], quizOptions: [],
  // flip state
  flipIdx: 0, flipScore: 0, flipFlipped: false, flipOrder: [],
  // type state
  typeIdx: 0, typeScore: 0, typeResult: null, typeOrder: [],
};

function render() {
  switch(state.screen) {
    case 'home': renderHome(); break;
    case 'setup': renderSetup(); break;
    case 'play': renderPlay(); break;
    case 'results': renderResults(); break;
  }
}

function renderHome() {
  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Interactive Language Game</div>
      <div class="header-title">100 Italian Phrases</div>
    </div>
    <div class="fade-up">
      <div class="mode-grid">
        ${MODES.map(m => `
          <button class="mode-card" data-mode="${m.id}">
            <div class="mode-icon">${m.icon}</div>
            <div class="mode-label">${m.label}</div>
            <div class="mode-desc">${m.desc}</div>
          </button>
        `).join('')}
      </div>
      <div class="tip-box">
        <strong>Tip:</strong> Start with Flashcards to learn, then test yourself with Match Pairs and Multiple Choice. Use Type It for the hardest challenge!
      </div>
    </div>`;
  app.querySelectorAll('.mode-card').forEach(btn => {
    btn.addEventListener('click', () => {
      state.mode = btn.dataset.mode;
      state.screen = 'setup';
      render();
    });
  });
}

function renderSetup() {
  const count = PHRASES.filter(p => state.selectedCats.has(p.cat)).length;
  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Choose Categories</div>
      <div class="header-title">Select & Play</div>
      <button class="back-btn" id="backBtn">← back to home</button>
    </div>
    <div class="fade-up">
      <div class="cat-wrap">
        ${CATEGORIES.map(cat => {
          const active = state.selectedCats.has(cat);
          const n = PHRASES.filter(p => p.cat === cat).length;
          return `<button class="cat-btn ${active ? 'active' : 'inactive'}" data-cat="${esc(cat)}">${esc(cat)} <span style="opacity:0.6">(${n})</span></button>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-bottom:16px;font-size:14px;color:var(--text-dim)">${count} phrases selected</div>
      <button class="start-btn" id="startBtn">Start Game →</button>
    </div>`;
  document.getElementById('backBtn').addEventListener('click', () => { state.screen = 'home'; render(); });
  app.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (state.selectedCats.has(cat)) { if (state.selectedCats.size > 1) state.selectedCats.delete(cat); }
      else state.selectedCats.add(cat);
      renderSetup();
    });
  });
  document.getElementById('startBtn').addEventListener('click', () => {
    state.gamePhrases = shuffle(PHRASES.filter(p => state.selectedCats.has(p.cat)));
    initGame();
    state.screen = 'play';
    render();
  });
}

function initGame() {
  if (state.mode === 'match') {
    const BATCH = 5;
    state.matchRounds = [];
    for (let i = 0; i < state.gamePhrases.length; i += BATCH)
      state.matchRounds.push(state.gamePhrases.slice(i, i + BATCH));
    state.matchRound = 0; state.matchScore = 0; state.matchTotal = 0;
    state.matchSelIt = null; state.matchMatched = new Set(); state.matchWrong = null;
  } else if (state.mode === 'quiz') {
    state.quizOrder = shuffle(state.gamePhrases);
    state.quizIdx = 0; state.quizScore = 0; state.quizSelected = null;
    prepQuizOptions();
  } else if (state.mode === 'flip') {
    state.flipOrder = shuffle(state.gamePhrases);
    state.flipIdx = 0; state.flipScore = 0; state.flipFlipped = false;
  } else if (state.mode === 'type') {
    state.typeOrder = shuffle(state.gamePhrases);
    state.typeIdx = 0; state.typeScore = 0; state.typeResult = null;
  }
}

function prepQuizOptions() {
  const correct = state.quizOrder[state.quizIdx];
  const others = shuffle(PHRASES.filter(p => p.it !== correct.it)).slice(0, 3);
  state.quizOptions = shuffle([correct, ...others]);
}

function renderPlay() {
  switch(state.mode) {
    case 'match': renderMatch(); break;
    case 'quiz': renderQuiz(); break;
    case 'flip': renderFlip(); break;
    case 'type': renderType(); break;
  }
}

// ─── MATCH ──────────────────────────────────────────────
function renderMatch() {
  const batch = state.matchRounds[state.matchRound] || [];
  const shuffledIt = shuffle(batch);
  const shuffledEn = shuffle(batch);
  const progress = state.matchRound * 5 + state.matchMatched.size;
  const total = state.gamePhrases.length;

  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Match Pairs</div>
      <button class="back-btn" id="backBtn">← back to home</button>
    </div>
    <div class="fade-up" style="padding:0 8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-size:13px;color:var(--text-dim);letter-spacing:0.04em">ROUND ${state.matchRound+1}/${state.matchRounds.length}</span>
        <span style="font-size:13px;color:var(--accent)">${progress}/${total} matched</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${(progress/total)*100}%"></div></div>
      <div style="display:flex;gap:20px;min-height:300px">
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="match-col-label">Italiano</div>
          ${shuffledIt.map(p => {
            const matched = state.matchMatched.has(p.it);
            const sel = state.matchSelIt === p.it;
            return `<button class="match-btn it-text" data-it="${esc(p.it)}" style="
              border-color:${sel?'var(--accent)':matched?'var(--success)':'var(--card-border)'};
              background:${matched?'var(--success-bg)':sel?'var(--accent-bg)':'var(--card)'};
              color:${matched?'var(--success)':'var(--text)'};
              opacity:${matched?0.55:1};
              ${sel?'transform:scale(1.02)':''}
            ">${esc(p.it)}</button>`;
          }).join('')}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="match-col-label">English</div>
          ${shuffledEn.map(p => {
            const matched = state.matchMatched.has(p.it);
            const wrong = state.matchWrong === p.it;
            return `<button class="match-btn ${wrong?'shake':''}" data-en="${esc(p.it)}" style="
              border-color:${matched?'var(--success)':wrong?'var(--wrong)':'var(--card-border)'};
              background:${matched?'var(--success-bg)':wrong?'var(--wrong-bg)':'var(--card)'};
              color:${matched?'var(--success)':wrong?'var(--wrong)':'var(--text)'};
              opacity:${matched?0.55:1};
              font-weight:400;
            ">${esc(p.en)}</button>`;
          }).join('')}
        </div>
      </div>
    </div>`;

  document.getElementById('backBtn').addEventListener('click', () => { state.screen = 'home'; render(); });

  app.querySelectorAll('[data-it]').forEach(btn => {
    btn.addEventListener('click', () => {
      const it = btn.dataset.it;
      if (state.matchMatched.has(it)) return;
      state.matchSelIt = it;
      state.matchWrong = null;
      render();
    });
  });

  app.querySelectorAll('[data-en]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!state.matchSelIt) return;
      const enKey = btn.dataset.en;
      if (state.matchMatched.has(enKey)) return;
      state.matchTotal++;
      if (state.matchSelIt === enKey) {
        state.matchScore++;
        state.matchMatched.add(enKey);
        state.matchSelIt = null;
        const batchLen = state.matchRounds[state.matchRound]?.length || 0;
        if (state.matchMatched.size === batchLen) {
          setTimeout(() => {
            if (state.matchRound + 1 < state.matchRounds.length) {
              state.matchRound++;
              state.matchMatched = new Set();
              state.matchSelIt = null;
              state.matchWrong = null;
              render();
            } else {
              state.score = state.matchScore;
              state.total = state.matchTotal;
              state.screen = 'results';
              render();
            }
          }, 500);
        }
        render();
      } else {
        state.matchWrong = enKey;
        render();
        setTimeout(() => { state.matchWrong = null; render(); }, 600);
      }
    });
  });
}

// ─── QUIZ ───────────────────────────────────────────────
function renderQuiz() {
  const current = state.quizOrder[state.quizIdx];
  const total = state.quizOrder.length;
  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Multiple Choice</div>
      <button class="back-btn" id="backBtn">← back to home</button>
    </div>
    <div class="fade-up" style="max-width:520px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--text-dim)">
        <span>${state.quizIdx+1} / ${total}</span><span>${state.quizScore} correct</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${((state.quizIdx+1)/total)*100}%"></div></div>
      <div class="phrase-card">
        <div class="phrase-label">Translate this phrase</div>
        <div class="phrase-text">${esc(current.it)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${state.quizOptions.map((opt, i) => {
          const isCorrect = opt.it === current.it;
          const isPicked = state.quizSelected === opt.it;
          const show = state.quizSelected !== null;
          let bg = 'var(--card)', bdr = 'var(--card-border)', col = 'var(--text)';
          if (show && isCorrect) { bg='var(--success-bg)'; bdr='var(--success)'; col='var(--success)'; }
          else if (show && isPicked && !isCorrect) { bg='var(--wrong-bg)'; bdr='var(--wrong)'; col='var(--wrong)'; }
          return `<button class="option-btn ${show&&isPicked&&!isCorrect?'shake':''}" data-pick="${esc(opt.it)}" style="border-color:${bdr};background:${bg};color:${col};cursor:${show?'default':'pointer'}">
            <span class="letter">${String.fromCharCode(65+i)}</span>${esc(opt.en)}
          </button>`;
        }).join('')}
      </div>
    </div>`;

  document.getElementById('backBtn').addEventListener('click', () => { state.screen = 'home'; render(); });
  if (state.quizSelected !== null) return;

  app.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.quizSelected !== null) return;
      const pick = btn.dataset.pick;
      state.quizSelected = pick;
      const isCorrect = pick === state.quizOrder[state.quizIdx].it;
      if (isCorrect) state.quizScore++;
      render();
      setTimeout(() => {
        if (state.quizIdx + 1 < state.quizOrder.length) {
          state.quizIdx++;
          state.quizSelected = null;
          prepQuizOptions();
        } else {
          state.score = state.quizScore;
          state.total = state.quizOrder.length;
          state.screen = 'results';
        }
        render();
      }, 1200);
    });
  });
}

// ─── FLASHCARDS ─────────────────────────────────────────
function renderFlip() {
  const current = state.flipOrder[state.flipIdx];
  const total = state.flipOrder.length;
  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Flashcards</div>
      <button class="back-btn" id="backBtn">← back to home</button>
    </div>
    <div class="fade-up" style="max-width:460px;margin:0 auto;text-align:center">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px">${state.flipIdx+1} / ${total}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${((state.flipIdx+1)/total)*100}%"></div></div>
      <div class="flip-container" id="flipCard">
        <div class="flip-inner ${state.flipFlipped?'flipped':''}">
          <div class="flip-face flip-front">
            <div class="phrase-label">Italiano</div>
            <div style="font-size:28px;font-weight:700;font-style:italic;color:var(--accent)">${esc(current.it)}</div>
            <div style="font-size:12px;color:var(--text-dim);margin-top:20px">tap to flip</div>
          </div>
          <div class="flip-face flip-back">
            <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:16px">English</div>
            <div style="font-size:24px;font-weight:600;color:var(--text)">${esc(current.en)}</div>
          </div>
        </div>
      </div>
      <div id="gradeButtons" style="display:${state.flipFlipped?'flex':'none'};gap:12px;justify-content:center">
        <button class="btn-outline" style="border-color:var(--wrong);color:var(--wrong);background:var(--wrong-bg)" id="didntKnow">Didn't know</button>
        <button class="btn-outline" style="border-color:var(--success);color:var(--success);background:var(--success-bg)" id="knewIt">Knew it!</button>
      </div>
    </div>`;

  document.getElementById('backBtn').addEventListener('click', () => { state.screen = 'home'; render(); });
  document.getElementById('flipCard').addEventListener('click', () => {
    state.flipFlipped = !state.flipFlipped;
    render();
  });
  const dk = document.getElementById('didntKnow');
  const ki = document.getElementById('knewIt');
  if (dk) dk.addEventListener('click', () => advanceFlip(false));
  if (ki) ki.addEventListener('click', () => advanceFlip(true));
}

function advanceFlip(knew) {
  if (knew) state.flipScore++;
  state.flipFlipped = false;
  if (state.flipIdx + 1 < state.flipOrder.length) {
    state.flipIdx++;
  } else {
    state.score = state.flipScore;
    state.total = state.flipOrder.length;
    state.screen = 'results';
  }
  render();
}

// ─── TYPE IT ────────────────────────────────────────────
function renderType() {
  const current = state.typeOrder[state.typeIdx];
  const total = state.typeOrder.length;
  const r = state.typeResult;
  let inputBorder = 'var(--card-border)', inputBg = 'var(--card)';
  if (r === true) { inputBorder = 'var(--success)'; inputBg = 'var(--success-bg)'; }
  if (r === false) { inputBorder = 'var(--wrong)'; inputBg = 'var(--wrong-bg)'; }

  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Type It</div>
      <button class="back-btn" id="backBtn">← back to home</button>
    </div>
    <div class="fade-up" style="max-width:500px;margin:0 auto">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;text-align:center">${state.typeIdx+1} / ${total}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${((state.typeIdx+1)/total)*100}%"></div></div>
      <div class="phrase-card">
        <div class="phrase-label">Translate to English</div>
        <div class="phrase-text">${esc(current.it)}</div>
      </div>
      <div class="type-row">
        <input class="type-input" id="typeInput" placeholder="Type your answer…" style="border-color:${inputBorder};background:${inputBg}" ${r!==null?'disabled':''}>
        <button class="check-btn" id="checkBtn" style="opacity:${r!==null?0.5:1}" ${r!==null?'disabled':''}>Check</button>
      </div>
      ${r === false ? `<div style="margin-top:12px;font-size:14px;color:var(--wrong)">Correct answer: <strong>${esc(current.en)}</strong></div>` : ''}
    </div>`;

  document.getElementById('backBtn').addEventListener('click', () => { state.screen = 'home'; render(); });
  const input = document.getElementById('typeInput');
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && input.value.trim()) checkType(input.value); });
  document.getElementById('checkBtn').addEventListener('click', () => { if (input.value.trim()) checkType(input.value); });
}

function checkType(val) {
  if (state.typeResult !== null) return;
  const current = state.typeOrder[state.typeIdx];
  const parts = current.en.split('/').map(s => normalize(s));
  const attempt = normalize(val);
  const isCorrect = parts.some(p => attempt === p) || attempt === normalize(current.en);
  if (isCorrect) state.typeScore++;
  state.typeResult = isCorrect;
  render();
  setTimeout(() => {
    state.typeResult = null;
    if (state.typeIdx + 1 < state.typeOrder.length) {
      state.typeIdx++;
    } else {
      state.score = state.typeScore;
      state.total = state.typeOrder.length;
      state.screen = 'results';
    }
    render();
  }, 1800);
}

// ─── RESULTS ────────────────────────────────────────────
function renderResults() {
  const pct = Math.round((state.score / state.total) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 90 ? 'Eccellente!' : pct >= 70 ? 'Molto bene!' : pct >= 50 ? "Non c'è male!" : 'Continua a studiare!';
  app.innerHTML = `
    <div class="header fade-up">
      <div class="header-sub">Results</div>
    </div>
    <div class="fade-up" style="text-align:center;padding:20px">
      <div class="results-emoji">${emoji}</div>
      <div class="results-msg">${msg}</div>
      <div class="results-pct">${pct}%</div>
      <div class="results-sub">${state.score} out of ${state.total} correct</div>
      <div class="results-btns">
        <button class="btn-outline" id="againBtn">Play Again</button>
        <button class="btn-solid" id="homeBtn">Home</button>
      </div>
    </div>`;
  document.getElementById('againBtn').addEventListener('click', () => {
    state.gamePhrases = shuffle(PHRASES.filter(p => state.selectedCats.has(p.cat)));
    initGame();
    state.screen = 'play';
    render();
  });
  document.getElementById('homeBtn').addEventListener('click', () => { state.screen = 'home'; render(); });
}

render();
</script>
</body>
</html>
